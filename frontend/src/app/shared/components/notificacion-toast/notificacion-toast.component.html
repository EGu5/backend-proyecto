<div class="contenedor-toasts">
  @for (toast of obtenerNotificaciones(); track toast.id) {
    <div class="toast-tarjeta" [ngClass]="obtenerClaseTipo(toast.tipo)">
      
      <!-- Iconos vectoriales SVG específicos por tipo (sin emojis) -->
      @if (toast.tipo === 'error') {
        <svg class="toast-icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      } @else if (toast.tipo === 'alerta') {
        <svg class="toast-icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      } @else if (toast.tipo === 'aceptado') {
        <svg class="toast-icono" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      }

      <!-- Contenido textual de la notificación -->
      <div class="toast-contenido">
        <span class="toast-mensaje">{{ toast.mensaje }}</span>
        @if (toast.codigo) {
          <span class="toast-codigo">{{ toast.codigo }}</span>
        }
      </div>

      <!-- Botón de descarte manual -->
      <button type="button" class="toast-cerrar" (click)="descartar(toast.id)" aria-label="Cerrar notificación">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

    </div>
  }
</div>
